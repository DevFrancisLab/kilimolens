# Render Blueprint — deploys the KilimoLens FastAPI backend.
# Docs: https://render.com/docs/blueprint-spec
#
# Create the service: Render Dashboard → New → Blueprint → pick this repo.
# Then fill in the secret env vars marked `sync: false` (Neo4j, Gemini,
# Africa's Talking) in the Render dashboard. Nothing secret lives in the repo.
services:
  - type: web
    name: kilimolens-api
    runtime: python
    # The FastAPI app lives in the backend/ subdirectory of this repo.
    rootDir: backend
    plan: free # ML deps (xgboost/shap) are memory-heavy; upgrade to `starter` if it OOMs.
    region: oregon
    branch: main
    # Train the synthetic XGBoost model into artifacts/ at build time. If training
    # fails (e.g. memory limits), the API still deploys and falls back to the
    # transparent weighted heuristic — the app is designed to degrade gracefully.
    buildCommand: >-
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      (python -m app.ml.train || echo "model training skipped; using heuristic fallback")
    # Bind to the port Render provides. --proxy-headers so HTTPS scheme / client IP
    # are correct behind Render's proxy (needed for Africa's Talking callbacks).
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Pin Python 3.11 — numpy 1.26.4 / scikit-learn 1.5.2 have no wheels on 3.13.
      - key: PYTHON_VERSION
        value: "3.11.9"

      # ── Neo4j knowledge graph (Neo4j Aura). Leave blank to run without Neo4j;
      #    a local SQLite mirror then serves the dashboard. ──
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_DATABASE
        sync: false

      # ── Gemini (Google) for LLM explanations. Blank => template fallback. ──
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

      # ── Africa's Talking (USSD + SMS). Blank AT_API_KEY => SMS disabled. ──
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: AT_SENDER_ID
        sync: false
      - key: AT_USSD_DEFAULT_LANGUAGE
        value: en

      # Shared secret guarding POST /api/sms/notify — generated by Render.
      - key: INTERNAL_API_TOKEN
        generateValue: true

      # ── CORS: the deployed frontend origin(s), comma-separated. ──
      - key: CORS_ORIGINS
        value: https://kilimolens.vercel.app,http://localhost:5173,http://localhost:3000
