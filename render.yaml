# Render Blueprint — deploys the KilimoLens FastAPI backend.
# Docs: https://render.com/docs/blueprint-spec
#
# Create the service: Render Dashboard → New → Blueprint → pick this repo.
# Then fill in the secret env vars marked `sync: false` (Neo4j, Gemini,
# Africa's Talking) in the Render dashboard. Nothing secret lives in the repo.
services:
  - type: web
    name: kilimolens-api
    # Docker build — Python, deps, model training and the start command are all
    # locked in backend/Dockerfile, so the host's defaults can't break the deploy.
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free # ML deps (xgboost/shap) are memory-heavy; upgrade to `starter` if it OOMs.
    region: oregon
    branch: main
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # ── Neo4j knowledge graph (Neo4j Aura). Leave blank to run without Neo4j;
      #    a local SQLite mirror then serves the dashboard. ──
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_DATABASE
        sync: false

      # ── Gemini (Google) for LLM explanations. Blank => template fallback. ──
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

      # ── Africa's Talking (USSD + SMS). Blank AT_API_KEY => SMS disabled. ──
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: AT_SENDER_ID
        sync: false
      - key: AT_USSD_DEFAULT_LANGUAGE
        value: en

      # Shared secret guarding POST /api/sms/notify — generated by Render.
      - key: INTERNAL_API_TOKEN
        generateValue: true

      # ── CORS: the deployed frontend origin(s), comma-separated. ──
      - key: CORS_ORIGINS
        value: https://kilimolens.vercel.app,http://localhost:5173,http://localhost:3000
